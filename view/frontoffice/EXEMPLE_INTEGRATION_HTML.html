<!-- 
    EXEMPLE : Intégration de la géolocalisation dans front_credit.php
    Ajouter cette structure HTML dans votre formulaire de crédit
-->

<!-- 1. Boîte d'informations de géolocalisation -->
<div id="geo-info" class="geo-info-box">
    <!-- Sera remplie dynamiquement par geolocation-form.js -->
</div>

<!-- 2. Formulaire de demande de crédit -->
<form method="POST" class="credit-form" id="credit-form">
    <input type="hidden" name="action" value="create_demande">
    
    <!-- Champs de géolocalisation (cachés) -->
    <input type="hidden" name="country_code" id="country_code">
    <input type="hidden" name="currency" id="currency">
    <input type="hidden" name="ip_client" id="ip_client">

    <!-- Montant -->
    <div class="form-group">
        <label for="montant">Montant demandé</label>
        <div class="input-with-info">
            <input 
                type="number" 
                name="montant" 
                id="montant"
                step="100"
                min="500"
                max="1000000"
                placeholder="500 - 1 000 000 TND"
                required
                class="form-control"
            >
            <span class="currency-symbol" id="currency-symbol">TND</span>
        </div>
        <small class="form-text">Montant adapté selon votre région</small>
    </div>

    <!-- Durée -->
    <div class="form-group">
        <label for="duree_mois">Durée du remboursement</label>
        <div class="input-wrapper">
            <input 
                type="number" 
                name="duree_mois" 
                id="duree_mois"
                min="6"
                max="60"
                value="36"
                required
                class="form-control"
            >
            <span class="unit">mois</span>
        </div>
        <small class="form-text">Durée maximale selon votre région</small>
    </div>

    <!-- Taux d'intérêt -->
    <div class="form-group">
        <label for="taux_interet">Taux d'intérêt annuel (%)</label>
        <input 
            type="number" 
            name="taux_interet" 
            id="taux_interet"
            step="0.1"
            min="1"
            max="20"
            value="7.5"
            required
            class="form-control"
            readonly
        >
        <small class="form-text">Taux adapté au profil de risque et à votre région</small>
    </div>

    <!-- Zone de simulation -->
    <div id="loan-simulation" class="simulation-box">
        <!-- Sera remplie dynamiquement -->
    </div>

    <!-- Bouton de soumission -->
    <button type="submit" class="btn btn-primary btn-lg">
        ✓ Soumettre la demande de crédit
    </button>
</form>
